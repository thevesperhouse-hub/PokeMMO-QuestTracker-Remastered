name: Linux (Avalonia)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Avalonia shell
        run: dotnet build PokeMMOTracker.Avalonia/PokeMMOTracker.Avalonia.csproj -c Release
